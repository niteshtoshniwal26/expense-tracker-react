<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div id="root"></div>

<script type="text/babel">

function Header({title, subtitle}) {
  return (
    <div className="bg-gradient-to-r from-blue-400 to-cyan-400 text-white p-6 rounded-b-3xl">
      <h2 className="text-xl font-bold">{title}</h2>
      <p>{subtitle}</p>
    </div>
  );
}

function App() {

  const [page, setPage] = React.useState("home");
  const [expenses, setExpenses] = React.useState(JSON.parse(localStorage.getItem("expenses")) || []);

  const [form, setForm] = React.useState({
    amount:"",
    category:"Fuel",
    payment:"ICICI",
    date:new Date().toISOString().split('T')[0],
    details:""
  });

  const categories = JSON.parse(localStorage.getItem("categories")) || ["Fuel","Food","Grocery","Other"];
  const payments = JSON.parse(localStorage.getItem("payments")) || ["ICICI","SBI","Coral CC","Emerald CC"];

  const save = ()=>{
    if(!form.amount || form.amount<=0) return;

    const newData = [...expenses, form];
    setExpenses(newData);
    localStorage.setItem("expenses", JSON.stringify(newData));

    setForm({...form, amount:"", details:""});
    setPage("home");
  };

  const deleteExp = (i)=>{
    if(!confirm("Delete?")) return;
    const arr=[...expenses];
    arr.splice(i,1);
    setExpenses(arr);
    localStorage.setItem("expenses", JSON.stringify(arr));
  };

  let total = expenses.reduce((a,b)=>a+Number(b.amount),0);

  return (
    <div>

      {page==="home" && (
        <>
          <Header title={`₹ ${total}`} subtitle="Your expenses" />

          <div className="p-4 -mt-4">

            <button onClick={()=>setPage("add")} className="w-full mb-3 bg-blue-500 text-white p-3 rounded-xl">
              + Add Expense
            </button>

            {expenses.map((e,i)=>(
              <div key={i} className="bg-white p-4 rounded-2xl shadow mb-3 flex justify-between">
                <div>
                  <div className="font-bold">₹{e.amount}</div>
                  <div className="text-xs text-gray-500">{e.category} • {e.payment}</div>
                  <div className="text-xs text-gray-400">{e.date}</div>
                </div>
                <button onClick={()=>deleteExp(i)}>❌</button>
              </div>
            ))}

          </div>
        </>
      )}

      {page==="add" && (
        <>
          <Header title="Add Expense" />

          <div className="p-4 -mt-4">
            <div className="bg-white p-4 rounded-2xl shadow">

              <input type="number" placeholder="Amount"
                className="w-full p-3 border rounded-xl mb-2"
                value={form.amount}
                onChange={e=>setForm({...form,amount:e.target.value})}
              />

              <select className="w-full p-3 border rounded-xl mb-2"
                onChange={e=>setForm({...form,category:e.target.value})}>
                {categories.map(c=><option key={c}>{c}</option>)}
              </select>

              <select className="w-full p-3 border rounded-xl mb-2"
                onChange={e=>setForm({...form,payment:e.target.value})}>
                {payments.map(p=><option key={p}>{p}</option>)}
              </select>

              <input type="date"
                className="w-full p-3 border rounded-xl mb-2"
                value={form.date}
                onChange={e=>setForm({...form,date:e.target.value})}
              />

              <input placeholder="Details"
                className="w-full p-3 border rounded-xl mb-2"
                value={form.details}
                onChange={e=>setForm({...form,details:e.target.value})}
              />

              <button onClick={save} className="w-full bg-gradient-to-r from-blue-400 to-cyan-400 text-white p-3 rounded-xl">
                Save
              </button>

            </div>
          </div>
        </>
      )}

      <div className="fixed bottom-0 w-full flex bg-white border-t">
        <button className="flex-1 p-2" onClick={()=>setPage("home")}>📊</button>
        <button className="flex-1 p-2" onClick={()=>setPage("add")}>➕</button>
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>

</body>
</html>
